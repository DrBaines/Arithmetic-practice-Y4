
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Year 4 Maths Practice</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
    }
    input {
      font-size: 20px;
      text-align: center;
      width: 100%;
      margin: 10px 0;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Year 4 Maths Practice</h2>

  <div>
    <button onclick="setMode('add')">Addition</button>
    <button onclick="setMode('sub')">Subtraction</button>
    <button onclick="setMode('mult')">Times Tables</button>
  </div>

  <h3 id="question">Click “New Question”</h3>

  <input id="answer" type="number"/>

  <button onclick="checkAnswer()">Check Answer</button>
  <button onclick="newQuestion()">New Question</button>

  <p id="feedback"></p>
</div>

<script>
  
    if (mode === "sub") {
      a = Math.floor(Math.random() * 9000) + 100;
      b = Math.floor(Math.random() * a); // ensures no negatives
      correct = a - b;
      text = `${a} − ${b}`;
    }


    if (mode === "mult") {
      a = Math.floor(Math.random() * 12) + 1;
      b = Math.floor(Math.random() * 12) + 1;
      correct = a * b;
      text = `${a} × ${b}`;
    }


    setQuestion({ text, correct });
    setAnswer("");
    setFeedback("");
  };

  const checkAnswer = () => {
    if (Number(answer) === question.correct) {
      setFeedback("✅ Correct – great work!");
    } else {
      setFeedback(`❌ Not quite. The correct answer was ${question.correct}.`);
    }
  };

  return (
    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-6">
      <Card className="w-full max-w-md rounded-2xl shadow-lg">
        <CardContent className="space-y-4 p-6">
          <h1 className="text-2xl font-bold text-center">Year 4 Maths Practice</h1>


          <div className="flex justify-center gap-2">
            <Button variant={mode === "add" ? "default" : "outline"} onClick={() => setMode("add")}>
              Addition
            </Button>
            <Button variant={mode === "sub" ? "default" : "outline"} onClick={() => setMode("sub")}>
              Subtraction
            </Button>
            <Button variant={mode === "mult" ? "default" : "outline"} onClick={() => setMode("mult")}>
              Times Tables
            </Button>
          </div>

          <Button className="w-full" onClick={generateQuestion}>New Question</Button>

          {question && (
            <div className="text-center space-y-3">
              <div className="text-3xl font-semibold">{question.text} = ?</div>
              <input
                type="number"
                value={answer}
                onChange={(e) => setAnswer(e.target.value)}
                className="border rounded-xl p-2 w-full text-center text-xl"
              />
              <Button onClick={checkAnswer} className="w-full">Check Answer</Button>
              {feedback && <div className="text-lg">{feedback}</div>}
            </div>
          )}
        </CardContent>
      </Card>
    </div>
  );
}

</script>

</body>
</html>
``
