
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Year 4 Maths Practice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 14px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }

    h1 {
      text-align: center;
      margin-top: 0;
    }

    .question {
      margin-bottom: 16px;
    }

    .question label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 18px;
    }

    .question input {
      width: 100%;
      padding: 8px;
      font-size: 18px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 10px;
      font-size: 18px;
      margin-top: 10px;
      cursor: pointer;
    }

    #feedback {
      margin-top: 16px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>Year 4 Maths Practice</h1>

  <div class="question">
    <label id="q1"></label>
    <input type="number" id="a1">
  </div>

  <div class="question">
    <label id="q2"></label>
    <input type="number" id="a2">
  </div>

  <div class="question">
    <label id="q3"></label>
    <input type="number" id="a3">
  </div>

  <div class="question">
    <label id="q4"></label>
    <input type="number" id="a4">
  </div>

  <button onclick="checkAnswers()">Check Answers</button>
  <button onclick="newQuestions()">New Questions</button>

  <div id="feedback"></div>
</div>

<script>
  let correctAnswers = [];

  function newQuestions() {
    correctAnswers = [];

    // Addition (3-digit + 3-digit)
    let addA = rand(100, 999);
    let addB = rand(100, 999);
    document.getElementById("q1").textContent = addA + " + " + addB;
    correctAnswers[0] = addA + addB;

    // Subtraction (no negatives)
    let subA = rand(100, 999);
    let subB = rand(0, subA);
    document.getElementById("q2").textContent = subA + " − " + subB;
    correctAnswers[1] = subA - subB;

    // Multiplication (3-digit × 1-digit)
    let multA = rand(100, 999);
    let multB = rand(2, 9);
    document.getElementById("q3").textContent = multA + " × " + multB;
    correctAnswers[2] = multA * multB;

    // Division (exact)
    let divB = rand(2, 9);
    let divAnswer = rand(10, 99);
    let divA = divB * divAnswer;
    document.getElementById("q4").textContent = divA + " ÷ " + divB;
    correctAnswers[3] = divAnswer;

    // Clear answers and feedback
    for (let i = 1; i <= 4; i++) {
      document.getElementById("a" + i).value = "";
    }
    document.getElementById("feedback").textContent = "";
  }

  function checkAnswers() {
